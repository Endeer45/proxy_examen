<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infraestructura Docker - Alta Disponibilidad</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Sistema Redundante</h1>
        <p class="subtitle">Desplegado con Docker Compose y Balanceo Nginx</p>

        <div class="media-grid">
            <div class="media-item">
                <img src="images/hero.png" alt="Infraestructura Tecnológica">
                <div class="caption">Imagen Generada: Concepto de Alta Disponibilidad</div>
            </div>
            <div class="media-item">
                <!-- Usando un video de ejemplo de la red para demostración -->
                <video controls autoplay muted loop>
                    <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-animation-of-a-server-room-4537-large.mp4" type="video/mp4">
                    Tu navegador no soporta videos.
                </video>
                <div class="caption">Multimedia: Simulación de Servidores</div>
            </div>
        </div>

        <div class="status-badge">
            <span class="dot"></span> 
            Balanceador activo: Distribuyendo tráfico a web1 y web2
        </div>
    </div>
</body>
</html>
