services:
  proxy:
    image: nginx:alpine
    container_name: proxy_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      - web1
      - web2
    restart: always

  web1:
    image: nginx:alpine
    container_name: web_backend_1
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - backend
    restart: always

  web2:
    image: nginx:alpine
    container_name: web_backend_2
    volumes:
      - ./html:/usr/share/nginx/html:ro
    networks:
      - backend
    restart: always

networks:
  frontend:
    name: red_externa
  backend:
    name: red_interna
    internal: true

volumes:
  web_content:
